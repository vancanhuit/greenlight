version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/data/queries"
    gen:
      go:
        package: "db"
        out: "internal/data/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
