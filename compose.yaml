x-postgres-base: &pg-base
    image: postgres:18
    restart: unless-stopped
    environment:
        POSTGRES_USER: dev
        POSTGRES_PASSWORD: dev
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U dev"]
        interval: 10s
        timeout: 5s
        retries: 5

x-api-base: &api-base
    build:
        context: .
        dockerfile: Dockerfile
    environment:
        GREENLIGHT_DB_DSN: postgres://dev:dev@postgres-dev:5432/greenlight?sslmode=disable
        GREENLIGHT_SMTP_HOST: mailpit
        GREENLIGHT_SMTP_USERNAME: dev
        GREENLIGHT_SMTP_PASSWORD: dev
        GREENLIGHT_SMTP_SENDER: "Greenlight <no-reply@greenlight.local>"
        SSL_CERT_FILE: /certs/rootCA.pem
    volumes:
        - ./.certs:/certs:ro

x-caddy-base: &caddy-base
    image: caddy:2
    ports:
        - "8443:8443"

services:
    postgres-dev:
        <<: *pg-base
        profiles: ["dev", "dev-tls", "dev-proxy", "dev-mtls"]
        environment:
            POSTGRES_USER: dev
            POSTGRES_PASSWORD: dev
            POSTGRES_DB: greenlight
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql
        networks:
            - dev
            - dev-tls
            - dev-proxy
            - dev-mtls

    postgres-test:
        <<: *pg-base
        profiles: ["test"]
        environment:
            POSTGRES_USER: dev
            POSTGRES_PASSWORD: dev
            POSTGRES_DB: greenlight_test
        ports:
            - "5433:5432"
        tmpfs:
            - /var/lib/postgresql
        networks:
            - test

    api:
        <<: *api-base
        profiles: ["dev"]
        command:
            - "-port=8000"
            - "-smtp-port=1025"
        ports:
            - "8000:8000"
        depends_on:
            postgres-dev:
                condition: service_healthy
            mailpit:
                condition: service_started
        networks:
            - dev

    api-tls:
        <<: *api-base
        profiles: ["dev-tls"]
        command:
            - "-port=8443"
            - "-smtp-port=1025"
            - "-tls-cert-file=/certs/localhost.pem"
            - "-tls-key-file=/certs/localhost-key.pem"
        ports:
            - "8443:8443"
        depends_on:
            postgres-dev:
                condition: service_healthy
            mailpit:
                condition: service_started
        networks:
            - dev-tls

    api-proxy:
        <<: *api-base
        profiles: ["dev-proxy"]
        command:
            - "-port=8000"
            - "-smtp-port=1025"
            - "-trust-proxy"
        depends_on:
            postgres-dev:
                condition: service_healthy
            mailpit:
                condition: service_started
        networks:
            - dev-proxy

    api-mtls:
        <<: *api-base
        profiles: ["dev-mtls"]
        command:
            - "-port=8000"
            - "-smtp-port=1025"
            - "-tls-cert-file=/certs/localhost.pem"
            - "-tls-key-file=/certs/localhost-key.pem"
            - "-tls-client-ca-file=/certs/rootCA.pem"
            - "-trust-proxy"
        depends_on:
            postgres-dev:
                condition: service_healthy
            mailpit:
                condition: service_started
        networks:
            - dev-mtls

    caddy-proxy:
        <<: *caddy-base
        profiles: ["dev-proxy"]
        volumes:
            - ./.certs:/certs:ro
            - ./Caddyfile.proxy:/etc/caddy/Caddyfile:ro
        depends_on:
            - api-proxy
        networks:
            - dev-proxy

    caddy-mtls:
        <<: *caddy-base
        profiles: ["dev-mtls"]
        volumes:
            - ./.certs:/certs:ro
            - ./Caddyfile.mtls:/etc/caddy/Caddyfile:ro
        depends_on:
            - api-mtls
        networks:
            - dev-mtls

    mailpit:
        image: axllent/mailpit:v1.30.4
        restart: unless-stopped
        profiles: ["dev", "dev-tls", "dev-proxy", "dev-mtls"]
        environment:
            MP_SMTP_AUTH_FILE: /etc/mailpit-auth.conf
            MP_SMTP_AUTH_ALLOW_INSECURE: 1
            MP_SMTP_TLS_CERT: /certs/mailpit.pem
            MP_SMTP_TLS_KEY: /certs/mailpit-key.pem
        volumes:
            - ./mailpit/auth.conf:/etc/mailpit-auth.conf:ro
            - ./.certs:/certs:ro
        ports:
            - "127.0.0.1:8025:8025"
        networks:
            - dev
            - dev-tls
            - dev-proxy
            - dev-mtls

volumes:
    pgdata:

networks:
    dev:
    dev-tls:
    dev-proxy:
    dev-mtls:
    test:
