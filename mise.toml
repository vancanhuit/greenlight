[settings]
task.run_auto_install = false

[tools]
go = "1.26.4"
sqlc = "1.31.1"
"aqua:pressly/goose" = "3.27.2"
golangci-lint = "2.12.2"
mkcert = "1.4.4"

[env]
GREENLIGHT_DB_DSN = "postgres://dev:dev@localhost:5432/greenlight?sslmode=disable"
VERSION = "{{ get_env(name='VERSION', default=exec(command='git describe --tags --always --dirty=-dev 2> /dev/null || echo dev')) }}"

[tasks.run]
description = "Run the API"
run = "go run ./cmd/api -db-dsn=$GREENLIGHT_DB_DSN"

[tasks.build]
description = "Build the API binary"
depends = ["sqlc"]
run = 'go build -ldflags="-s -X main.version=$VERSION" -o=./bin/api ./cmd/api'

[tasks.test]
description = "Run unit tests (no DB)"
run = "go test -race ./..."

[tasks."test:db"]
description = "Run tests including DB integration tests"
env = { GREENLIGHT_TEST_DB_DSN = "postgres://dev:dev@localhost:5433/greenlight_test?sslmode=disable" }
depends = ["db:up"]
depends_post = ["db:down"]
run = "go test -cover -race -v ./..."

[tasks."lint:fmt"]
description = "Run golangci-lint with formatting checks"
run = [
  'golangci-lint fmt -v ./cmd/... ./internal/... ./migrations/...',
  'git diff --exit-code cmd internal migrations',
]

[tasks.lint]
description = "Run linters"
run = [
  'go vet ./...',
  'golangci-lint run -v ./cmd/... ./internal/... ./migrations/...',
]

[tasks.audit]
description = "Verify modules and vendored deps are in sync"
run = [
  'go mod verify',
  'go mod vendor',
  'git diff --exit-code vendor',
]

[tasks.sqlc]
description = "Generate sqlc code"
run = "sqlc generate"

[tasks."migrate:up"]
description = "Apply all up migrations"
usage = '''
arg "<db-dsn>" help="Database DSN to use for migrations"
'''
run = "goose -dir=./migrations postgres {{usage_db_dsn}} up"

[tasks."migrate:down"]
description = "Roll back the last migration"
usage = '''
arg "<db-dsn>" help="Database DSN to use for migrations"
'''
run = "goose -dir=./migrations postgres {{usage_db_dsn}} down"

[tasks."migrate:new"]
description = "Create a new migration: mise run migrate:new <name>"
usage = '''
arg "<name>" help="Name of the migration"
'''
run = "goose -dir=./migrations create {{usage_name}} sql"

[tasks."db:up"]
description = "Start the test Postgres stack"
run = "docker compose --profile test up -d --wait"

[tasks."db:down"]
description = "Stop the test Postgres stack"
run = "docker compose --profile test down"

[tasks."dev:up"]
description = "Start dev stack (plain HTTP)"
run = "docker compose --profile dev up -d"

[tasks."dev:up:https"]
description = "Start dev stack (HTTPS via mkcert + caddy)"
run = "docker compose --profile dev-https up -d"

[tasks."certs:setup"]
description = "Generate local TLS certs with mkcert"
run = [
  "mkdir -p .certs",
  "mkcert -install",
  "mkcert -cert-file .certs/localhost.pem -key-file .certs/localhost-key.pem localhost 127.0.0.1",
  "mkcert -cert-file .certs/mailpit.pem -key-file .certs/mailpit-key.pem mailpit",
  'cp "$(mkcert -CAROOT)/rootCA.pem" .certs/rootCA.pem',
]
